<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vikings Event Management</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- LOGIN CONTAINER - Only shown when NOT authenticated -->
    <div id="login-container" class="container-fluid vh-100 d-flex align-items-center justify-content-center">
        <div class="card shadow-lg" style="max-width: 400px; width: 100%;">
            <div class="card-header bg-primary text-white text-center">
                <h4><i class="fas fa-shield-alt me-2"></i>Vikings Event Management</h4>
            </div>
            <div class="card-body text-center p-4">
                <h5 class="mb-3">Welcome!</h5>
                <p class="text-muted mb-4">Please log in with your Online Scout Manager account to continue.</p>
                <button id="login-btn" class="btn btn-primary btn-lg">
                    <i class="fas fa-sign-in-alt me-2"></i>Login with OSM
                </button>
            </div>
        </div>
    </div>

    <!-- MAIN CONTAINER - Only shown when authenticated -->
    <div id="main-container" class="container-fluid" style="display: none;">
        <!-- Navigation Bar -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#"><i class="fas fa-users me-2"></i>Vikings Event Management</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <button id="logout-btn" class="btn btn-outline-light">
                                <i class="fas fa-sign-out-alt me-1"></i>Logout
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Main Content Area -->
        <div class="container-fluid mt-3">
            <div class="row">
                <!-- Sidebar -->
                <div class="col-md-3 col-lg-2">
                    <div class="card">
                        <div class="card-header">
                            <h6 class="mb-0"><i class="fas fa-list me-2"></i>Sections</h6>
                        </div>
                        <div class="card-body p-2">
                            <div id="sections-container">
                                <button id="load-sections-btn" class="btn btn-outline-primary btn-sm w-100">
                                    <i class="fas fa-download me-1"></i>Load Sections
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Main Content -->
                <div class="col-md-9 col-lg-10">
                    <div id="main-content">
                        <div class="card">
                            <div class="card-body text-center py-5">
                                <h5 class="text-muted">Welcome to Vikings Event Management</h5>
                                <p class="text-muted">Select a section from the sidebar to view events and attendance.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Your main application -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
